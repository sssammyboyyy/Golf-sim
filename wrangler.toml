name = "deploymulligan"
compatibility_date = "2024-11-20"

[build]
command = "npm run build && npx @cloudflare/next-on-pages"

[site]
bucket = ".vercel/output/static"

# These variables should be set in the Cloudflare Dashboard for production security,
# but defining them here ensures Cloudflare knows they exist and allows for local development overrides.
# DO NOT commit actual secrets here. Use empty strings or placeholders.
[vars]
NEXT_PUBLIC_SUPABASE_URL = ""
NEXT_PUBLIC_SUPABASE_ANON_KEY = ""
N8N_WEBHOOK_URL = ""
YOCO_SECRET_KEY = ""
NEXT_PUBLIC_APP_URL = ""
